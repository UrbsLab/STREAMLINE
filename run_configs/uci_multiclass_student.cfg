[run]
output_path = out
experiment_name = UCIStudentPipeline
outcome_label = Class
outcome_type = Multiclass
instance_label = InstanceID
n_splits = 3
# Options: Serial, Local (Dask), Parallel (joblib), BashSLURM, BashLSF, or a named Dask cluster.
run_cluster = Serial
queue = defq
reserved_memory = 4
random_state = 42

[phases]
phase_order = p1,p2,p3,p4,p5,p6,p7,p8,p9,p10,p11
do_p1 = True
do_p2 = True
do_p3 = True
do_p4 = True
do_p5 = True
do_p6 = True
do_p7 = True
do_p8 = True
do_p9 = True
do_p10 = True
do_p11 = True

[p1]
data_path = data/UCIMulticlassClassification
exclude_eda_output = None
match_label = None
ignore_features = None
categorical_features = data/UCIFeatureTypes/student_dropout_categorical_features.csv
quantitative_features = data/UCIFeatureTypes/student_dropout_quantitative_features.csv
top_features = 20
categorical_cutoff = 10
sig_cutoff = 0.05
featureeng_missingness = 0.5
cleaning_missingness = 0.5
correlation_removal_threshold = 1.0
partition_method = Stratified
show_plots = False
one_hot_encoding = True
cv_provided = False
cv_input_root = None
enable_plots = False
plot_missingness = False
plot_class_counts = False
plot_correlation = False
correlation_plot_max_features = 200
plot_univariate = False
univariate_top_k = 20
plot_anomalies = False
force = True

[p2]
scale_data = True
impute_data = True
multi_impute = False
overwrite_cv = True
imputer_id = None
imputer_params = {}
scaler_id = None
scaler_params = {}
smote = False
smote_method = auto
smote_sampling_strategy = auto
smote_k_neighbors = 5

[p3]
learner_id = pca
learner_params = {}
feature_namespace = FL_PCA
keep_original_features = True
overwrite_cv = True

[p4]
models = mutualinformation,multiswrfdb
models_params = {'mutualinformation': {'outcome_type': 'Multiclass'}, 'multiswrfdb': {'n_jobs': 1}}
top_k = None
threshold = None
keep_original_features = False
overwrite_cv = True
instance_subset = 1000

[p5]
algorithms = auto
n_splits = 3
max_features_to_keep = 2000
filter_poor_features = True
overwrite_cv = False
selector_id = default
selector_params = {}
export_scores = True
top_features = 20
show_plots = False
strict_discovery = False

[p6]
outcome_type = Multiclass
model_type = None
models = NB,LR,DT
model_params_json = None
calibrate = False
calibrate_method = sigmoid
calibrate_cv = 5
scoring_metric = balanced_accuracy
metric_direction = maximize
n_trials = 200
timeout = 900
training_subsample = 0
uniform_fi = False
save_plot = False
bypass_one_hot_for_native_models = False
native_categorical_models = CGB,ExSTraCS

[p7]
ensembles = hard_voting,soft_voting,stack_lr
base_models = NB,LR,DT
meta_train_source = train
calibrate = 0
calibrate_method = sigmoid
calibrate_cv = 5

[p8]
scoring_metric = balanced_accuracy
metric_weight = balanced_accuracy
top_features = 40
sig_cutoff = 0.05
scale_data = True
exclude_plots = None
show_plots = False
include_ensembles = True
multiclass_average = micro

[p9]
sig_cutoff = 0.05
show_plots = False

[p10]
rep_data_path = data/UCIRepMulticlassClassification
dataset_for_rep = data/UCIMulticlassClassification/student_dropout_academic_success.csv
match_label = None
exclude_plots = None
show_plots = False

[p11]
report_modes = standard,replication
reporting_dir = None
outcome_label = Class
outcome_type = Multiclass
instance_label = InstanceID
make_pdf = True
enable_plots = True
reuse_existing_figures = True

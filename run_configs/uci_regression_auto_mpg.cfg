[run]
output_path = out
experiment_name = UCIAutoMPGPipeline
outcome_label = MPG
outcome_type = Continuous
instance_label = InstanceID
n_splits = 3
run_cluster = Serial
random_state = 42

[phases]
phase_order = p1,p2,p3,p4,p5,p6,p7,p8,p9,p10,p11
do_p1 = True
do_p2 = True
do_p3 = True
do_p4 = True
do_p5 = True
do_p6 = True
do_p7 = False
do_p8 = True
do_p9 = True
do_p10 = True
do_p11 = True

[p1]
data_path = data/UCIRegression
partition_method = Random
categorical_features = data/UCIFeatureTypes/auto_mpg_categorical_features.csv
quantitative_features = data/UCIFeatureTypes/auto_mpg_quantitative_features.csv
force = True

[p2]
smote = False

[p3]
learner_id = pca
learner_params = {}
keep_original_features = True

[p4]
models = mutualinformation,multisurf
models_params = {'mutualinformation': {'outcome_type': 'Continuous'}, 'multisurf': {'n_jobs': 4}}

[p5]
algorithms = auto
selector_id = default
top_features = 20

[p6]
model_type = Regression
models = LR,RF
scoring_metric = explained_variance
metric_direction = maximize
n_trials = 200
timeout = 900
save_plot = False

[p7]
enabled = False

[p8]
scoring_metric = explained_variance
metric_weight = explained_variance
top_features = 40
include_ensembles = False
show_plots = False

[p9]
sig_cutoff = 0.05
show_plots = False

[p10]
rep_data_path = data/UCIRepRegression
dataset_for_rep = data/UCIRegression/auto_mpg.csv
show_plots = False

[p11]
report_modes = standard,replication
make_pdf = True
enable_plots = True
reuse_existing_figures = True
